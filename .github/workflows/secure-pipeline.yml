name: Secure Docker Pipeline

on:
  push:
    branches:
      - main

permissions:
  contents: read
  packages: write

jobs:

  build:
    runs-on: ubuntu-latest

    steps:

      - name: Checkout Code
        uses: actions/checkout@v5

      - name: Build Docker Image
        run: |
          docker build -t myapp:latest .

      - name: Save Image
        run: docker save myapp:latest -o image.tar

      - name: Upload Image Artifact
        uses: actions/upload-artifact@v4
        with:
          name: docker-image
          path: image.tar


  scan:
    needs: build
    runs-on: ubuntu-latest

    steps:

      - name: Download Image Artifact
        uses: actions/download-artifact@v4
        with:
          name: docker-image

      - name: Load Image
        run: docker load -i image.tar

      - name: Run Trivy Security Scan
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: myapp:latest
          format: table
          exit-code: 1
          severity: CRITICAL,HIGH


  push:
    needs: scan
    runs-on: ubuntu-latest

    steps:

      - name: Checkout Code
        uses: actions/checkout@v5

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build Image Again
        run: |
          docker build \
          -t ghcr.io/${{ github.repository_owner }}/myapp:${{ github.sha }} .

      - name: Push Image
        run: |
          docker push \
          ghcr.io/${{ github.repository_owner }}/myapp:${{ github.sha }}